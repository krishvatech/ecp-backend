<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>{{ app_name }}</h2>
    <p>Hi {{ first_name }},</p>
    <p>Thanks for joining part of <strong>"{{ event_title }}"</strong>! The full recording is now available so you can catch everything you may have missed.</p>

    <p style="text-align: center; margin: 25px 0;">
        <a href="{{ replay_url }}" style="background-color: #0066cc; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block;">Watch the Full Recording</a>
    </p>

    <p>If you have any questions, contact us at {{ support_email }}.</p>

    <p>Best regards,<br>The {{ app_name }} Team</p>
</body>
</html>
