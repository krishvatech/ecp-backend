services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecp}
      POSTGRES_USER: ${POSTGRES_USER:-ecp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecp_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 --application-close-timeout 30 ecp_backend.asgi:application
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ecp_backend.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://ecp:ecp_password@db:5432/ecp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery-worker:
    build: .
    command: celery -A ecp_backend.celery worker -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ecp_backend.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://ecp:ecp_password@db:5432/ecp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    command: celery -A ecp_backend.celery beat -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ecp_backend.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://ecp:ecp_password@db:5432/ecp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
